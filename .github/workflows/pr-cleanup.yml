name: PR Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Pages preview deployments
        run: |
          BRANCH="pr-${{ github.event.pull_request.number }}"
          API="https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/xrutayisire/deployments"
          PAGE=1

          while true; do
            RESPONSE=$(curl -sf "$API?page=$PAGE" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")

            IDS=$(echo "$RESPONSE" | jq -r --arg branch "$BRANCH" \
              '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id')

            for id in $IDS; do
              echo "Deleting deployment $id"
              curl -sf -X DELETE "$API/$id?force=true" \
                -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"
            done

            COUNT=$(echo "$RESPONSE" | jq -r '.result_info.count')
            if [ "$COUNT" -eq "0" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done
        continue-on-error: true
